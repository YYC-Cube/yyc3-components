name: Smart Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smart-check:
    name: Smart Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Smart Audit
        id: audit
        run: |
          chmod +x scripts/strict-audit.sh
          bash scripts/strict-audit.sh 2>&1 | tee audit-output.txt
          echo "audit_result=$(grep -c '✅' audit-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "warning_count=$(grep -c '⚠️' audit-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "error_count=$(grep -c '❌' audit-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Check Results
        run: |
          if [ "${{ steps.audit.outputs.error_count }}" -gt 0 ]; then
            echo "❌ Smart check failed with ${{ steps.audit.outputs.error_count }} errors"
            exit 1
          else
            echo "✅ Smart check passed with ${{ steps.audit.outputs.warning_count }} warnings"
          fi

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-output.txt
          retention-days: 7

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditOutput = fs.readFileSync('audit-output.txt', 'utf8');
            
            const passCount = (auditOutput.match(/✅/g) || []).length;
            const warningCount = (auditOutput.match(/⚠️/g) || []).length;
            const errorCount = (auditOutput.match(/❌/g) || []).length;
            
            const comment = `## 🔍 Smart Quality Check Results
            
            - ✅ Passed: ${passCount}
            - ⚠️ Warnings: ${warningCount}
            - ❌ Errors: ${errorCount}
            
            ${errorCount === 0 ? '### ✅ All critical checks passed!' : '### ❌ Some checks failed. Please review.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
