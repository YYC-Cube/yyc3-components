name: Smart Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smart-check:
    name: Smart Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Smart Audit
        id: audit
        run: |
          chmod +x scripts/smart-check.sh
          bash scripts/smart-check.sh 2>&1 | tee audit-output.txt
          
          # 提取统计信息
          PASSED=$(grep -o "通过:[[:space:]]*[0-9]*" audit-output.txt | grep -o "[0-9]*$" || echo 0)
          FAILED=$(grep -o "失败:[[:space:]]*[0-9]*" audit-output.txt | grep -o "[0-9]*$" || echo 0)
          WARNINGS=$(grep -o "警告:[[:space:]]*[0-9]*" audit-output.txt | grep -o "[0-9]*$" || echo 0)
          SCORE=$(grep -o "代码质量分数:[[:space:]]*[0-9]*" audit-output.txt | grep -o "[0-9]*%" || echo "0%")
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Run CI/CD Checks
        id: cicd
        run: |
          chmod +x scripts/cicd-check.sh
          bash scripts/cicd-check.sh 2>&1 | tee cicd-output.txt

      - name: Check Results
        run: |
          if [ "${{ steps.audit.outputs.failed }}" -gt 0 ]; then
            echo "❌ Smart check failed with ${{ steps.audit.outputs.failed }} errors"
            exit 1
          else
            echo "✅ Smart check passed"
            echo "- Passed: ${{ steps.audit.outputs.passed }}"
            echo "- Warnings: ${{ steps.audit.outputs.warnings }}"
            echo "- Quality Score: ${{ steps.audit.outputs.score }}"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## 🧠 Smart Quality Check Results
            
            **Quality Score:** ${{ steps.audit.outputs.score }}
            
            ### Statistics
            - ✅ Passed: ${{ steps.audit.outputs.passed }}
            - ❌ Failed: ${{ steps.audit.outputs.failed }}
            - ⚠️ Warnings: ${{ steps.audit.outputs.warnings }}
            
            ### CI/CD Checks
            All CI/CD checks completed successfully. ✅
            
            View the full report in the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            audit-output.txt
            cicd-output.txt
          retention-days: 30
